name: personal_scanner_app
description: A personal barcode scanner and transaction tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Image Picker
  image_picker: ^1.1.2

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo-launcher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
